<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cloud Expense Tracker</title>
    <!-- Remix Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Google Fonts & Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Background Deco Glow Orbs -->
    <div class="glow-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Header Actions (Theme Toggle Only) -->
    <div style="position: absolute; top: 1.5rem; right: 2rem;">
        <button id="theme-toggle" class="theme-toggle">
            <i class="ri-moon-line"></i>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="nav-brand" style="justify-content: center; margin-bottom: 1rem;">
                    <i class="ri-wallet-3-line"></i>
                    <span>Cloud Expense Tracker</span>
                </div>
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your dashboard</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.85rem;">
                    <span>Sign In</span>
                    <i class="ri-arrow-right-line"></i>
                </button>
            </form>

            <div class="form-footer">
                <p>Don't have an account? <a href="register.html">Sign Up</a></p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Script imports -->
    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Guard: Redirect if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            redirectIfAuth();

            // Check if redirect due to session expiration
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('expired') === 'true') {
                showToast('Your session has expired. Please sign in again.', 'error');
            }

            // Bind Form Submit
            const form = document.getElementById('login-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                // Call auth login logic
                await login(email, password);
            });
        });
    </script>
</body>
</html>
