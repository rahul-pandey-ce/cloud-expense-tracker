<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Cloud Expense Tracker</title>
    <!-- Remix Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Google Fonts & Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Background Deco Glow Orbs -->
    <div class="glow-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Header Actions (Theme Toggle Only) -->
    <div style="position: absolute; top: 1.5rem; right: 2rem;">
        <button id="theme-toggle" class="theme-toggle">
            <i class="ri-moon-line"></i>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="nav-brand" style="justify-content: center; margin-bottom: 1rem;">
                    <i class="ri-wallet-3-line"></i>
                    <span>Cloud Expense Tracker</span>
                </div>
                <h2>Create Account</h2>
                <p>Start tracking and optimizing your expenses for free</p>
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.85rem;">
                    <span>Get Started</span>
                    <i class="ri-arrow-right-line"></i>
                </button>
            </form>

            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Script imports -->
    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Guard: Redirect if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            redirectIfAuth();

            // Bind Form Submit
            const form = document.getElementById('register-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                if (password.length < 6) {
                    showToast('Password must be at least 6 characters long', 'error');
                    return;
                }
                
                // Call auth register logic
                await register(name, email, password);
            });
        });
    </script>
</body>
</html>
